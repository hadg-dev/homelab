# ----------------------------------------------------
# 1. Self-signed root issuer
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-selfsigned
spec:
  selfSigned: {}

---
# ----------------------------------------------------
# 2. Root CA certificate (becomes our internal CA)
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-root-ca
  secretName: homelab-root-ca-secret
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: homelab-selfsigned
    kind: ClusterIssuer

---
# ----------------------------------------------------
# 3. CA issuer (used by all apps)
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca-issuer
spec:
  ca:
    secretName: homelab-root-ca-secret

---
# ----------------------------------------------------
# 4. Grafana certificate (example app TLS)
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  commonName: grafana.local
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - grafana.local
    - grafana.homelab.local

---
# ----------------------------------------------------
# 5. ArgoCD certificate
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  commonName: argocd.local
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - argocd.local

---
# ----------------------------------------------------
# 5. Prometheus certificate
# ----------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
  namespace: monitoring
spec:
  secretName: prometheus-tls
  commonName: prometheus.local
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - prometheus.local